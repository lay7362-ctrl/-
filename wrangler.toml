name = "my-cloudflare-app"
main = "worker/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# 정적 파일 서빙 (Cloudflare Pages 연동 시 사용)
# [site]
# bucket = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "myapp-db"
database_id = "1e71681a-76e2-4013-8b9f-9f32c4d39537"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "association2"
preview_bucket_name = "myapp-bucket"

[vars]
ENVIRONMENT = "development"
CORS_ORIGIN = "*"

# 로컬 개발용 시크릿 (실제 배포 시 wrangler secret put 사용)
# JWT_SECRET = "local-dev-secret"

name = "my-cloudflare-app"
main = "worker/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# 정적 파일 서빙 (Cloudflare Pages 연동 시 사용)
# [site]
# bucket = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "myapp-db"
database_id = "1e71681a-76e2-4013-8b9f-9f32c4d39537"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "association2"
preview_bucket_name = "myapp-bucket"

[vars]
ENVIRONMENT = "development"
CORS_ORIGIN = "*"
FRONTEND_URL = "https://my-cloudflare-app-eua.pages.dev"
GOOGLE_CLIENT_ID = "566569893146-qkdc7eu6r36a15rq0sgrd2fft71ds5ku.apps.googleusercontent.com"
NAVER_CLIENT_ID = "8kQFmvCnkWDdUWUG0hXa"
KAKAO_CLIENT_ID = ""

# 시크릿 등록 완료 (wrangler secret put으로 등록됨):
# JWT_SECRET, GOOGLE_CLIENT_SECRET, NAVER_CLIENT_SECRET
